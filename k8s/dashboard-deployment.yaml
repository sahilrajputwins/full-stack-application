apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: sahilrajputwins/full-stack-app-demo-dashboard-service
          ports:
            - containerPort: 3002
